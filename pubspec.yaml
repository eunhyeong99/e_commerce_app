name: e_commerce_app
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_svg: ^2.0.17
  freezed_annotation: ^3.0.0
  go_router: ^15.0.0
  json_annotation: ^4.9.0
  retrofit: ^4.4.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.9

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/env/
    - assets/svg/
    - assets/icon/
    - assets/image/
    - assets/lottie/

dependency_overrides:
  analyzer: ^6.2.0

